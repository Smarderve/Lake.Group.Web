<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <meta name="theme-color" content="#0181BB">
  <link rel="manifest" href="manifest.webmanifest">
  <title>You're Offline | Lake Group</title>
  <link rel="canonical" href="https://www.lakeoilgroup.com/offline.html">
  <link rel="icon" href="favicon.ico?v=43" sizes="32x32">
  <link rel="icon" href="assets/icons/pwa/icon-192.png?v=43" type="image/png" sizes="192x192">
  <link rel="apple-touch-icon" href="assets/icons/pwa/apple-touch-icon.png?v=43">
  <!-- flagship.css is precached by the service worker, but this page must
       render with zero external dependencies: the inline block below is a
       complete standalone Meridian layer and intentionally loads after it. -->
  <link rel="stylesheet" href="assets/tokens.css?v=56">
<link rel="stylesheet" href="assets/flagship.css?v=68">
  <link rel="stylesheet" href="assets/assistant.css?v=56">
  <style>
    /* ======================================================================
       MERIDIAN UTILITY PAGE  offline fallback. Fully self-contained.
       ====================================================================== */
    @import url("assets/tokens.css?v=56");
    @import url('assets/fonts/fonts.css');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink:   var(--color-brand-blue-darkest);
      --ink-2: var(--color-brand-blue-deep);
      --gold:  var(--color-yellow-accent);
      --line:  rgba(255,255,255,0.14);
      --line2: rgba(255,255,255,0.07);
      --txt:   rgba(233,237,248,0.78);
    }
    html, body { min-height: 100%; }
    body {
      font-family: var(--font-body);
      background: var(--color-hero-bg);
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      line-height: 1.7;
      position: relative;
      overflow-x: clip;
    }
    /* Meridian survey grid */
    body::before {
      content: ''; position: fixed; inset: 0; pointer-events: none;
      background-image:
        linear-gradient(to right, var(--line2) 1px, transparent 1px),
        linear-gradient(to bottom, var(--line2) 1px, transparent 1px);
      background-size: 120px 120px;
    }
    /* Gold meridian line descending from the top edge */
    body::after {
      content: ''; position: fixed; top: 0; left: 32px;
      width: 1px; height: 42vh;
      background: linear-gradient(var(--gold), transparent);
      opacity: 0.55; pointer-events: none;
    }
    .card { max-width: 620px; width: 100%; text-align: center; position: relative; z-index: 2; }
    .logo-wrap {
      display: inline-block;
      background: transparent;
      border-radius: 0;
      padding: 0;
      margin-bottom: 40px;
      box-shadow: none;
    }
    .logo-wrap img { height: 44px; width: auto; display: block; }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      color: var(--gold);
      font-size: 0.7rem;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      font-weight: 700;
      margin-bottom: 22px;
    }
    .badge::before, .badge::after { content: ''; width: 8px; height: 8px; background: var(--gold); }
    h1 {
      font-family: 'Bebas Neue', 'Arial Narrow', sans-serif;
      font-weight: 400;
      font-size: clamp(2.6rem, 9vw, 4.6rem);
      line-height: 0.95;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      margin-bottom: 18px;
    }
    h1 em { color: var(--gold); font-style: normal; }
    @supports (-webkit-text-stroke: 1px black) {
      h1 em { color: transparent; -webkit-text-stroke: 1.5px rgba(255,242,0,0.65); }
    }
    p.lead { color: var(--txt); margin: 0 auto 32px; font-size: 1rem; font-weight: 300; max-width: 48ch; }
    /* Cached destinations register */
    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 0;
      justify-content: center;
      margin: 0 auto 36px;
      border: 1px solid var(--line);
      width: fit-content;
      max-width: 100%;
    }
    .links a {
      color: var(--txt);
      text-decoration: none;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      padding: 12px 18px;
      border-right: 1px solid var(--line);
      transition: color 0.2s, background 0.2s;
    }
    .links a:last-child { border-right: none; }
    .links a:hover { color: var(--gold); background: rgba(255,255,255,0.04); }
    .retry {
      display: inline-block;
      background: var(--gold);
      color: var(--ink);
      font-family: inherit;
      font-weight: 700;
      font-size: 0.78rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 17px 40px;
      border: none;
      cursor: pointer;
      clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 0 100%);
      transition: background 0.2s, color 0.2s;
    }
    .retry:hover { background: #fff; color: var(--ink); }
    .status {
      margin: 26px auto 0;
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(233,237,248,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: fit-content;
      padding-top: 14px;
      border-top: 1px solid var(--line2);
      position: relative;
    }
    .status::before { content: ''; position: absolute; left: 0; top: -4px; width: 8px; height: 8px; background: var(--gold); }
    .status .dot {
      display: inline-block;
      width: 8px; height: 8px;
      background: #0599D3; /* no red in the brand palette: offline state uses Light Blue */
      flex: none;
    }
    .status.online .dot { background: #2ECC71; }
    a:focus-visible, button:focus-visible { outline: 2px solid var(--gold); outline-offset: 3px; }
    @media (max-width: 560px) {
      .links { border: none; gap: 8px; }
      .links a { border: 1px solid var(--line); }
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="logo-wrap"><img src="assets/images/logos/LAKE_GROUP_LOGO.png" alt="Lake Group"></div>
    <div class="badge">Connection Lost</div>
    <h1>You're currently <em>offline</em></h1>
    <p class="lead">This page isn't available without an internet connection. Pages you've visited before are saved and still work  try one of these, or reconnect and retry.</p>
    <nav class="links">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="services.html">Services</a>
      <a href="africa-network.html">Africa Network</a>
      <a href="contact.html">Contact</a>
    </nav>
    <button class="retry" onclick="location.reload()">Retry Connection</button>
    <p class="status" id="net-status"><span class="dot"></span><span id="net-text">Offline  waiting for connection?</span></p>
  </main>
  <script>
    (function () {
      var statusEl = document.getElementById('net-status');
      var textEl = document.getElementById('net-text');
      function onOnline() {
        statusEl.classList.add('online');
        textEl.textContent = 'Back online  reloading?';
        // Small delay so the user sees the status flip before navigation.
        // If the browser is showing offline.html under its own URL (opened
        // directly, not as a fallback for another page), reloading would
        // just serve offline.html again in an endless loop  go home
        // instead. In the fallback case the address bar still holds the
        // page the user originally wanted, so a plain reload restores it.
        setTimeout(function () {
          if (/offline\.html$/.test(location.pathname)) {
            location.replace('index.html');
          } else {
            location.reload();
          }
        }, 800);
      }
      window.addEventListener('online', onOnline);
      if (navigator.onLine) onOnline();
    })();
  </script>
<script src="assets/pwa.js?v=56" defer></script>
<script src="assets/flagship-motion.js?v=56" defer></script>
  <script src="assets/vendor/flexsearch/flexsearch.bundle.min.js" defer></script>
  <script src="assets/assistant-kb.js" defer></script>
  <script src="assets/assistant.js?v=56" defer></script>
</body>
</html>
