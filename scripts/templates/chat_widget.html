<div id="chat-widget">
  <div id="chat-box">
    <div id="chat-head"><h4 data-i18n="chat.title">Lake Group Assistant</h4><p data-i18n="chat.sub">Ask us anything</p></div>
    <div id="chat-messages"><div class="msg msg-bot" data-i18n="chat.hello">Hello! How can I help you today?</div></div>
    <div id="chat-input-row"><input type="text" id="chat-input" placeholder="Type a message..." data-i18n-placeholder="chat.placeholder"><button id="chat-send" data-i18n="chat.send">Send</button></div>
  </div>
  <button id="chat-btn" aria-label="Chat">

      <ellipse class="la-fab-sheen" cx="32" cy="18" rx="16" ry="5.5" fill="#ffffff" opacity="0.28"/>
      <circle class="la-fab-dot" cx="23.5" cy="27" r="3.15" fill="#0181BB"/>
      <circle class="la-fab-dot" cx="32" cy="27" r="3.15" fill="#0181BB"/>
      <circle class="la-fab-dot" cx="40.5" cy="27" r="3.15" fill="#0181BB"/>
    </svg>
  </button>
</div>
