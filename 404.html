<!DOCTYPE html>
<html lang="en">
<head>
  <style id="lg-skel-critical">html.lg-loading{overflow:hidden}html.lg-loading::before{content:"";position:fixed;inset:0;z-index:99989;background:#013f5c;pointer-events:none}html.lg-skel-done::before{display:none}.nav-logo img,.site-nav .nav-logo img{height:var(--nav-logo-height,48px)!important;width:auto!important;max-width:min(220px,55vw)!important;max-height:var(--nav-logo-height,48px)!important;object-fit:contain}</style>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <meta name="theme-color" content="#0181BB">
  <meta name="robots" content="noindex">
  <meta name="description" content="Page not found — return to Lake Group homepage, companies, or contact.">
  <link rel="manifest" href="manifest.webmanifest">
  <title>404 — Page Not Found | Lake Group</title>
  <link rel="icon" href="favicon.ico?v=43" sizes="32x32">
  <link rel="icon" href="assets/icons/pwa/icon-192.png?v=43" type="image/png" sizes="192x192">
  <link rel="apple-touch-icon" href="assets/icons/pwa/apple-touch-icon.png?v=43">
  <link rel="stylesheet" href="assets/tokens.css?v=58">
  <link rel="stylesheet" href="assets/fonts/fonts.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink: #013F5C;
      --blue: #0181BB;
      --gold: #FFF200;
      --line: rgba(255,255,255,0.14);
      --txt: rgba(233,237,248,0.82);
    }
    html, body { min-height: 100%; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--ink);
      color: #fff;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px 20px;
      line-height: 1.7;
      position: relative;
      overflow-x: clip;
      cursor: default;
    }
    .fx-grid {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image:
        linear-gradient(to right, rgba(255,255,255,0.045) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255,255,255,0.045) 1px, transparent 1px);
      background-size: 96px 96px;
      transform: translate3d(var(--gx, 0), var(--gy, 0), 0);
      transition: transform 0.35s ease-out;
    }
    .fx-glow {
      position: fixed; width: 42vw; height: 42vw; max-width: 520px; max-height: 520px;
      border-radius: 50%; pointer-events: none; z-index: 0;
      background: radial-gradient(circle, rgba(1,129,187,0.35) 0%, transparent 70%);
      left: var(--mx, 50%); top: var(--my, 40%);
      transform: translate(-50%, -50%);
      transition: left 0.45s ease-out, top 0.45s ease-out;
      opacity: 0.9;
    }
    .fx-meridian {
      position: fixed; top: 0; left: clamp(20px, 6vw, 48px);
      width: 1px; height: 48vh;
      background: linear-gradient(var(--gold), transparent);
      opacity: 0.55; pointer-events: none; z-index: 0;
    }
    .card {
      max-width: 680px; width: 100%; text-align: center;
      position: relative; z-index: 2;
    }
    .logo-wrap {
      display: inline-block; margin-bottom: 36px;
      transition: transform 0.35s ease;
    }
    .logo-wrap:hover { transform: translateY(-2px); }
    .logo-wrap img { height: 44px; width: auto; max-width: min(220px, 70vw); display: block; object-fit: contain; }
    .code {
      font-family: 'Bebas Neue', 'Arial Narrow', sans-serif;
      font-size: clamp(6.5rem, 24vw, 12rem);
      line-height: 0.82;
      letter-spacing: 0.04em;
      color: transparent;
      -webkit-text-stroke: 2px rgba(255,242,0,0.7);
      margin-bottom: 18px;
      user-select: none;
      position: relative;
      transition: transform 0.4s ease;
    }
    .code::after {
      content: '404';
      position: absolute; inset: 0;
      color: rgba(255,242,0,0.08);
      -webkit-text-stroke: 0;
      transform: translate(6px, 6px);
      z-index: -1;
    }
    .badge {
      display: inline-flex; align-items: center; gap: 12px;
      color: var(--gold); font-size: 0.7rem; letter-spacing: 0.32em;
      text-transform: uppercase; font-weight: 700; margin-bottom: 16px;
    }
    .badge::before, .badge::after { content: ''; width: 8px; height: 8px; background: var(--gold); }
    h1 {
      font-family: 'Bebas Neue', 'Arial Narrow', sans-serif;
      font-weight: 400;
      font-size: clamp(2rem, 6vw, 3.2rem);
      line-height: 0.98; letter-spacing: 0.02em;
      text-transform: uppercase; margin-bottom: 14px;
    }
    h1 em { color: var(--gold); font-style: normal; }
    p.lead {
      color: var(--txt); margin: 0 auto 28px;
      font-size: 1rem; font-weight: 300; max-width: 46ch;
    }
    .search-row {
      display: flex; gap: 0; max-width: 420px; margin: 0 auto 28px;
      border: 1px solid var(--line); background: rgba(255,255,255,0.03);
    }
    .search-row input {
      flex: 1; min-width: 0; border: 0; background: transparent;
      color: #fff; padding: 14px 16px; font: inherit; font-size: 0.92rem;
      outline: none;
    }
    .search-row input::placeholder { color: rgba(233,237,248,0.45); }
    .search-row button {
      border: 0; background: var(--gold); color: var(--ink);
      font-weight: 700; font-size: 0.72rem; letter-spacing: 0.16em;
      text-transform: uppercase; padding: 0 18px; cursor: pointer;
      font-family: inherit;
    }
    .search-row button:hover { background: #fff; }
    .links {
      display: flex; flex-wrap: wrap; gap: 0; justify-content: center;
      margin: 0 auto 32px; border: 1px solid var(--line);
      width: fit-content; max-width: 100%;
    }
    .links a {
      color: var(--txt); text-decoration: none;
      font-size: 0.72rem; font-weight: 700; letter-spacing: 0.16em;
      text-transform: uppercase; padding: 12px 16px;
      border-right: 1px solid var(--line);
      transition: color 0.2s, background 0.2s;
    }
    .links a:last-child { border-right: none; }
    .links a:hover { color: var(--gold); background: rgba(255,255,255,0.04); }
    .actions { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; }
    .home, .back {
      display: inline-block; font-weight: 700; font-size: 0.78rem;
      letter-spacing: 0.18em; text-transform: uppercase;
      padding: 16px 34px; text-decoration: none;
      clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 0 100%);
      transition: background 0.2s, color 0.2s, transform 0.2s;
    }
    .home { background: var(--gold); color: var(--ink); }
    .home:hover { background: #fff; color: var(--ink); transform: translateY(-1px); }
    .back {
      background: transparent; color: var(--txt);
      border: 1px solid var(--line);
      clip-path: none; border-radius: 0;
    }
    .back:hover { color: var(--gold); border-color: rgba(255,242,0,0.45); }
    a:focus-visible, button:focus-visible, input:focus-visible {
      outline: 2px solid var(--gold); outline-offset: 3px;
    }
    @media (max-width: 560px) {
      .links { border: none; gap: 8px; }
      .links a { border: 1px solid var(--line); }
      .search-row { flex-direction: column; }
      .search-row button { padding: 12px; }
    }
    @media (prefers-reduced-motion: reduce) {
      .fx-grid, .fx-glow, .code, .logo-wrap, .home { transition: none !important; }
    }
  </style>
</head>
<body>
  <div class="fx-grid" aria-hidden="true"></div>
  <div class="fx-glow" aria-hidden="true"></div>
  <div class="fx-meridian" aria-hidden="true"></div>
  <main class="card">
    <a class="logo-wrap" href="index.html"><img src="assets/images/logos/LAKE_GROUP_LOGO.png" alt="Lake Group" width="180" height="44"></a>
    <div class="code" id="code404" aria-hidden="true">404</div>
    <div class="badge">Page Not Found</div>
    <h1>This route is <em>off the map</em></h1>
    <p class="lead">The page you requested does not exist or may have moved. Search a destination, pick a hub below, or return home.</p>
    <form class="search-row" id="dest-form" action="index.html" method="get" role="search">
      <label class="visually-hidden" for="dest-q" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)">Find a page</label>
      <input id="dest-q" name="q" type="search" placeholder="Try: oil, leadership, contact…" autocomplete="off">
      <button type="submit">Go</button>
    </form>
    <nav class="links" aria-label="Popular destinations">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="services.html">Services</a>
      <a href="africa-network.html">Network</a>
      <a href="contact.html">Contact</a>
    </nav>
    <div class="actions">
      <a class="home" href="index.html">Back to Homepage</a>
      <a class="back" href="javascript:history.back()">Go Back</a>
    </div>
  </main>
  <script>
    (function () {
      var reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      var root = document.documentElement;
      var code = document.getElementById('code404');
      if (!reduce) {
        window.addEventListener('pointermove', function (e) {
          var x = e.clientX / window.innerWidth;
          var y = e.clientY / window.innerHeight;
          root.style.setProperty('--mx', (x * 100) + '%');
          root.style.setProperty('--my', (y * 100) + '%');
          root.style.setProperty('--gx', ((x - 0.5) * -12) + 'px');
          root.style.setProperty('--gy', ((y - 0.5) * -12) + 'px');
          if (code) code.style.transform = 'translate(' + ((x - 0.5) * 10) + 'px,' + ((y - 0.5) * 8) + 'px)';
        }, { passive: true });
      }

      var map = {
        home: 'index.html', about: 'about.html', oil: 'lake-oil.html', gas: 'lake-gas.html',
        steel: 'lake-steel.html', agro: 'lake-agro.html', atl: 'atl.html', contact: 'contact.html',
        leadership: 'leadership.html', careers: 'careers.html', news: 'news.html',
        services: 'services.html', network: 'africa-network.html', gallery: 'gallery.html',
        investors: 'investors.html', fleet: 'fleet.html', sustainability: 'sustainability.html'
      };
      document.getElementById('dest-form').addEventListener('submit', function (e) {
        e.preventDefault();
        var q = (document.getElementById('dest-q').value || '').trim().toLowerCase();
        if (!q) { location.href = 'index.html'; return; }
        for (var key in map) {
          if (Object.prototype.hasOwnProperty.call(map, key) && q.indexOf(key) !== -1) {
            location.href = map[key];
            return;
          }
        }
        location.href = 'services.html';
      });
    })();
  </script>
  <script src="assets/pwa.js?v=58" defer></script>
</body>
</html>
