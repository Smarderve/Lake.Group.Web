  <style>
    /* ======================================================================
       MERIDIAN UTILITY PAGE  404. Fully self-contained inline styles
       (flagship.css is linked below as an enhancement only).
       ====================================================================== */
    @import url("assets/tokens.css?v=44");
    @import url('assets/fonts/fonts.css');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink:   var(--color-brand-blue-darkest);
      --ink-2: var(--color-brand-blue-deep);
      --gold:  var(--color-yellow-accent);
      --line:  rgba(255,255,255,0.14);
      --line2: rgba(255,255,255,0.07);
      --txt:   rgba(233,237,248,0.78);
    }
    html, body { min-height: 100%; }
    body {
      font-family: var(--font-body);
      background: var(--color-hero-bg);
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      line-height: 1.7;
      position: relative;
      overflow-x: clip;
    }
    /* Meridian survey grid */
    body::before {
      content: ''; position: fixed; inset: 0; pointer-events: none;
      background-image:
        linear-gradient(to right, var(--line2) 1px, transparent 1px),
        linear-gradient(to bottom, var(--line2) 1px, transparent 1px);
      background-size: 120px 120px;
    }
    /* Gold meridian line descending from the top edge */
    body::after {
      content: ''; position: fixed; top: 0; left: 32px;
      width: 1px; height: 42vh;
      background: linear-gradient(var(--gold), transparent);
      opacity: 0.55; pointer-events: none;
    }
    .card { max-width: 620px; width: 100%; text-align: center; position: relative; z-index: 2; }
    .logo-wrap {
      display: inline-block;
      background: transparent;
      border-radius: 0;
      padding: 0;
      margin-bottom: 40px;
      box-shadow: none;
    }
    .logo-wrap img { height: 44px; width: auto; display: block; }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      color: var(--gold);
      font-size: 0.7rem;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      font-weight: 700;
      margin-bottom: 18px;
    }
    .badge::before, .badge::after { content: ''; width: 8px; height: 8px; background: var(--gold); }
    .code {
      position: relative;
      font-family: 'Bebas Neue', 'Arial Narrow', sans-serif;
      font-weight: 400;
      font-size: clamp(7rem, 26vw, 13rem);
      line-height: 0.85;
      letter-spacing: 0.04em;
      color: transparent;
      -webkit-text-stroke: 2px rgba(255,242,0,0.65);
      margin-bottom: 22px;
      user-select: none;
    }
    h1 {
      font-family: 'Bebas Neue', 'Arial Narrow', sans-serif;
      font-weight: 400;
      font-size: clamp(2rem, 6vw, 3.2rem);
      line-height: 0.98;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      margin-bottom: 16px;
    }
    h1 em { color: var(--gold); font-style: normal; }
    p.lead { color: var(--txt); margin: 0 auto 32px; font-size: 1rem; font-weight: 300; max-width: 46ch; }
    /* Destination register */
    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 0;
      justify-content: center;
      margin: 0 auto 36px;
      border: 1px solid var(--line);
      width: fit-content;
      max-width: 100%;
    }
    .links a {
      color: var(--txt);
      text-decoration: none;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      padding: 12px 18px;
      border-right: 1px solid var(--line);
      transition: color 0.2s, background 0.2s;
    }
    .links a:last-child { border-right: none; }
    .links a:hover { color: var(--gold); background: rgba(255,255,255,0.04); }
    .home {
      display: inline-block;
      background: var(--gold);
      color: var(--ink);
      font-weight: 700;
      font-size: 0.78rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 17px 40px;
      text-decoration: none;
      clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 0 100%);
      transition: background 0.2s, color 0.2s;
    }
    .home:hover { background: #fff; color: var(--ink); }
    a:focus-visible { outline: 2px solid var(--gold); outline-offset: 3px; }
    @media (max-width: 560px) {
      .links { border: none; gap: 8px; }
      .links a { border: 1px solid var(--line); }
    }
  </style>
</head>

    </nav>
    <a class="home" href="index.html">Back to Homepage</a>
  </main>
